name: Inspect

include:
  - path: project.local.yml
    enable: ${INCLUDE_LOCAL_PROJECT_YML}

options:
  bundleIdPrefix: in.fourplex
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"

configFiles:
  Debug: Configs/Project.xcconfig
  Release: Configs/Project.xcconfig

settings:
  base:
    CURRENT_PROJECT_VERSION: 84
    MARKETING_VERSION: 2.5.1
    SWIFT_VERSION: 6.0
    TARGETED_DEVICE_FAMILY: "1,2"
    INSPECT_APP_GROUP_IDENTIFIER: group.in.fourplex.inspect.monitor

packages:
  InspectCore:
    path: Packages/InspectCore

targets:
  InspectPacketTunnelExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Extensions/PacketTunnel/Sources
      - path: Extensions/PacketTunnel/Resources
        buildPhase: resources
        excludes:
          - Info.plist
          - InspectMacPacketTunnelExtension-Info.plist
          - InspectMacPacketTunnelExtension.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.fourplex.Inspect.PacketTunnelExtension
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Extensions/PacketTunnel/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Configs/Entitlements/InspectNetworkExtensionAppGroup.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: Extensions/PacketTunnel/Sources/InspectPacketTunnelExtension-Bridging-Header.h
        HEADER_SEARCH_PATHS: $(inherited) "$(PROJECT_DIR)/Rust/tunnel-core/include"
        LIBRARY_SEARCH_PATHS: $(inherited) "$(BUILT_PRODUCTS_DIR)"
        OTHER_LDFLAGS: $(inherited) -ltunnel_core
        SKIP_INSTALL: YES
    preBuildScripts:
      - name: Build Rust Tunnel Core
        script: |
          export PATH="$HOME/.cargo/bin:$PATH"
          ./scripts/build_rust_lib.sh
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/libtunnel_core.a
    dependencies:
      - package: InspectCore
        product: InspectCore

  InspectMacPacketTunnelExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: Extensions/PacketTunnel/Sources
      - path: Extensions/PacketTunnel/Resources
        buildPhase: resources
        excludes:
          - Info.plist
          - InspectMacPacketTunnelExtension-Info.plist
          - InspectMacPacketTunnelExtension.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.fourplex.Inspect.PacketTunnelExtension
        APPLICATION_EXTENSION_API_ONLY: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Extensions/PacketTunnel/Resources/InspectMacPacketTunnelExtension-Info.plist
        CODE_SIGN_ENTITLEMENTS: Extensions/PacketTunnel/Resources/InspectMacPacketTunnelExtension.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: Extensions/PacketTunnel/Sources/InspectPacketTunnelExtension-Bridging-Header.h
        HEADER_SEARCH_PATHS: $(inherited) "$(PROJECT_DIR)/Rust/tunnel-core/include"
        LIBRARY_SEARCH_PATHS: $(inherited) "$(BUILT_PRODUCTS_DIR)"
        OTHER_LDFLAGS: $(inherited) -ltunnel_core
        SKIP_INSTALL: YES
    preBuildScripts:
      - name: Build Rust Tunnel Core
        script: |
          export PATH="$HOME/.cargo/bin:$PATH"
          ./scripts/build_rust_lib.sh
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/libtunnel_core.a
    dependencies:
      - package: InspectCore
        product: InspectCore
      - sdk: SystemConfiguration.framework

  InspectActionExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Extensions/Action/Sources
      - path: Extensions/ActionShared/Resources
        buildPhase: resources
      - path: Extensions/Action/Resources
        buildPhase: resources
        excludes:
          - Info.plist
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: ExtensionIcon
        PRODUCT_BUNDLE_IDENTIFIER: in.fourplex.Inspect.ActionExtension
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Extensions/Action/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Configs/Entitlements/InspectAppGroup.entitlements
        SKIP_INSTALL: YES
    dependencies:
      - package: InspectCore
        product: InspectKit

  InspectSafariWebExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Extensions/SafariWeb/Sources
      - path: Extensions/SafariWeb/Resources
        buildPhase: resources
        excludes:
          - Info-iOS.plist
          - Info-macOS.plist
          - InspectMacSafariWebExtension.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.fourplex.Inspect.SafariWebExtension
        PRODUCT_NAME: InspectSafariWebExtension
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Extensions/SafariWeb/Resources/Info-iOS.plist
        CODE_SIGN_ENTITLEMENTS: Configs/Entitlements/InspectAppGroup.entitlements
        SWIFT_STRICT_CONCURRENCY: minimal
        SKIP_INSTALL: YES
    preBuildScripts:
      - name: Generate App Icons
        script: |
          ./scripts/generate_safari_web_icons.sh
        inputFiles:
          - $(PROJECT_DIR)/Apps/macOS/Resources/AppIcon.disabled/icon_512x512@2x.png
          - $(PROJECT_DIR)/scripts/generate_safari_web_icons.sh
        outputFiles:
          - $(PROJECT_DIR)/Extensions/SafariWeb/Resources/images/icon-48.png
          - $(PROJECT_DIR)/Extensions/SafariWeb/Resources/images/icon-96.png
          - $(PROJECT_DIR)/Extensions/SafariWeb/Resources/images/icon-128.png
          - $(PROJECT_DIR)/Extensions/SafariWeb/Resources/images/icon-256.png
          - $(PROJECT_DIR)/Extensions/SafariWeb/Resources/images/icon-512.png
      - name: Generate Safari Web Config
        script: |
          ./scripts/generate_safari_web_config.sh
        inputFiles:
          - $(PROJECT_DIR)/Packages/InspectCore/Sources/Core/InspectScheme.swift
          - $(PROJECT_DIR)/scripts/generate_safari_web_config.sh
        outputFiles:
          - $(PROJECT_DIR)/Extensions/SafariWeb/Resources/generated/inspect-config.js
    dependencies:
      - package: InspectCore
        product: InspectCore
      - sdk: SafariServices.framework

  InspectLiveMonitorWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: Extensions/LiveMonitorWidget/Sources
      - path: Extensions/LiveMonitorWidget/Resources
        buildPhase: resources
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.fourplex.Inspect.Widget
        PRODUCT_NAME: InspectLiveMonitorWidget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Extensions/LiveMonitorWidget/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Configs/Entitlements/InspectAppGroup.entitlements
        SKIP_INSTALL: YES
    dependencies:
      - package: InspectCore
        product: InspectKit
      - sdk: WidgetKit.framework

  Inspect:
    type: application
    platform: iOS
    sources:
      - path: Apps/iOS/Sources
      - path: Apps/iOS/Resources
        buildPhase: resources
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.fourplex.Inspect
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Apps/iOS/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Configs/Entitlements/InspectNetworkExtensionAppGroup.entitlements
    dependencies:
      - package: InspectCore
        product: InspectKit
      - target: InspectPacketTunnelExtension
        embed: true
      - target: InspectActionExtension
        embed: true
      - target: InspectSafariWebExtension
        embed: true
      - target: InspectLiveMonitorWidget
        embed: true
    scheme:
      gatherCoverageData: false
      testTargets:
        - InspectAppTests

  InspectMacSafariWebExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: Extensions/SafariWeb/Sources
      - path: Extensions/SafariWeb/Resources
        buildPhase: resources
        excludes:
          - Info-iOS.plist
          - Info-macOS.plist
          - InspectMacSafariWebExtension.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.fourplex.Inspect.SafariWebExtensionMac
        PRODUCT_NAME: InspectMacSafariWebExtension
        APPLICATION_EXTENSION_API_ONLY: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Extensions/SafariWeb/Resources/Info-macOS.plist
        CODE_SIGN_ENTITLEMENTS: Extensions/SafariWeb/Resources/InspectMacSafariWebExtension.entitlements
        SWIFT_STRICT_CONCURRENCY: minimal
        SKIP_INSTALL: YES
    preBuildScripts:
      - name: Generate App Icons
        script: |
          ./scripts/generate_safari_web_icons.sh
        inputFiles:
          - $(PROJECT_DIR)/Apps/macOS/Resources/AppIcon.disabled/icon_512x512@2x.png
          - $(PROJECT_DIR)/scripts/generate_safari_web_icons.sh
        outputFiles:
          - $(PROJECT_DIR)/Extensions/SafariWeb/Resources/images/icon-48.png
          - $(PROJECT_DIR)/Extensions/SafariWeb/Resources/images/icon-96.png
          - $(PROJECT_DIR)/Extensions/SafariWeb/Resources/images/icon-128.png
          - $(PROJECT_DIR)/Extensions/SafariWeb/Resources/images/icon-256.png
          - $(PROJECT_DIR)/Extensions/SafariWeb/Resources/images/icon-512.png
      - name: Generate Safari Web Config
        script: |
          ./scripts/generate_safari_web_config.sh
        inputFiles:
          - $(PROJECT_DIR)/Packages/InspectCore/Sources/Core/InspectScheme.swift
          - $(PROJECT_DIR)/scripts/generate_safari_web_config.sh
        outputFiles:
          - $(PROJECT_DIR)/Extensions/SafariWeb/Resources/generated/inspect-config.js
    dependencies:
      - package: InspectCore
        product: InspectCore
      - sdk: SafariServices.framework

  InspectMacShareExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: Extensions/MacShare/Sources
      - path: Extensions/MacShare/Resources
        buildPhase: resources
        excludes:
          - Info.plist
          - InspectMacShareExtension.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.fourplex.Inspect.ShareExtension
        PRODUCT_NAME: InspectMacShareExtension
        APPLICATION_EXTENSION_API_ONLY: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Extensions/MacShare/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Extensions/MacShare/Resources/InspectMacShareExtension.entitlements
        SKIP_INSTALL: YES
    dependencies:
      - package: InspectCore
        product: InspectKit

  InspectMac:
    type: application
    platform: macOS
    sources:
      - path: Apps/macOS/Sources
      - path: Apps/macOS/Resources
        buildPhase: resources
        excludes:
          - AppIcon.disabled
          - Info.plist
          - InspectMac.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.fourplex.Inspect
        PRODUCT_NAME: Inspect
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Apps/macOS/Resources/Info.plist
        INFOPLIST_ENABLE_CFBUNDLEICONS_MERGE: NO
        CODE_SIGN_ENTITLEMENTS: Apps/macOS/Resources/InspectMac.entitlements
    dependencies:
      - package: InspectCore
        product: InspectCore
      - package: InspectCore
        product: InspectKit
      - target: InspectMacPacketTunnelExtension
        embed: true
      - target: InspectMacSafariWebExtension
        embed: true
      - target: InspectMacShareExtension
        embed: true
    scheme:
      gatherCoverageData: false
      testTargets:
        - InspectMacTests

  InspectAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Packages/InspectCore/Tests/CoreTests
        excludes:
          - CertificateParserTests.swift
          - TLSFlowObservationFeedTests.swift
          - TestFixtureSupport.swift
      - path: Packages/InspectCore/Tests/FeatureTests
    dependencies:
      - package: InspectCore
        product: InspectCore
      - package: InspectCore
        product: InspectKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: in.fourplex.Inspect.tests

  InspectMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Packages/InspectCore/Tests/CoreTests
        excludes:
          - CertificateParserTests.swift
          - TLSFlowObservationFeedTests.swift
          - TestFixtureSupport.swift
      - path: Packages/InspectCore/Tests/FeatureTests
    dependencies:
      - package: InspectCore
        product: InspectCore
      - package: InspectCore
        product: InspectKit
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: in.fourplex.Inspect.mac.tests
