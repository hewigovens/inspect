name: Inspect

options:
  bundleIdPrefix: in.fourplex
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "18.0"

configFiles:
  Debug: Configs/Project.xcconfig
  Release: Configs/Project.xcconfig

settings:
  base:
    CURRENT_PROJECT_VERSION: 72
    MARKETING_VERSION: 2.2
    SWIFT_VERSION: 6.0
    TARGETED_DEVICE_FAMILY: "1,2"
    INSPECT_APP_GROUP_IDENTIFIER: group.in.fourplex.inspect.monitor

packages:
  InspectCore:
    path: Packages/InspectCore

targets:
  InspectAppProxyExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: AppProxyExtension/Sources
      - path: AppProxyExtension/Resources
        buildPhase: resources
        excludes:
          - Info.plist
          - InspectAppProxyExtension.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.fourplex.Inspect.AppProxyExtension
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: AppProxyExtension/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: AppProxyExtension/Resources/InspectAppProxyExtension.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: AppProxyExtension/Sources/InspectAppProxyExtension-Bridging-Header.h
        HEADER_SEARCH_PATHS: $(inherited) "$(PROJECT_DIR)/Rust/inspect-tunnel-core/include"
        LIBRARY_SEARCH_PATHS: $(inherited) "$(BUILT_PRODUCTS_DIR)"
        OTHER_LDFLAGS: $(inherited) -linspect_tunnel_core
        SKIP_INSTALL: YES
    preBuildScripts:
      - name: Build Rust Tunnel Core
        script: ./scripts/build_rust_ios_lib.sh
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/libinspect_tunnel_core.a
    dependencies:
      - package: InspectCore
        product: InspectCore

  InspectActionExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Extension/Sources
      - path: Extension/Resources
        buildPhase: resources
        excludes:
          - Info.plist
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: ExtensionIcon
        PRODUCT_BUNDLE_IDENTIFIER: in.fourplex.Inspect.ActionExtension
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Extension/Resources/Info.plist
        SKIP_INSTALL: YES
    dependencies:
      - package: InspectCore
        product: InspectFeature

  Inspect:
    type: application
    platform: iOS
    sources:
      - path: App/Sources
      - path: App/Resources
        buildPhase: resources
        excludes:
          - Info.plist
          - Inspect.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.fourplex.Inspect
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: App/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Resources/Inspect.entitlements
    dependencies:
      - package: InspectCore
        product: InspectFeature
      - target: InspectAppProxyExtension
        embed: true
      - target: InspectActionExtension
        embed: true

schemes:
  Inspect:
    build:
      targets:
        Inspect: all
        InspectAppProxyExtension: all
        InspectActionExtension: all
