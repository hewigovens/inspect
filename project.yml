name: Inspect

options:
  bundleIdPrefix: in.fourplex
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "18.0"
    macOS: "15.0"

configFiles:
  Debug: Configs/Project.xcconfig
  Release: Configs/Project.xcconfig

settings:
  base:
    CURRENT_PROJECT_VERSION: 75
    MARKETING_VERSION: 2.3
    SWIFT_VERSION: 6.0
    TARGETED_DEVICE_FAMILY: "1,2"
    INSPECT_APP_GROUP_IDENTIFIER: group.in.fourplex.inspect.monitor

packages:
  InspectCore:
    path: Packages/InspectCore

targets:
  InspectPacketTunnelExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: PacketTunnelExtension/Sources
      - path: PacketTunnelExtension/Resources
        buildPhase: resources
        excludes:
          - Info.plist
          - InspectPacketTunnelExtension.entitlements
          - InspectMacPacketTunnelExtension-Info.plist
          - InspectMacPacketTunnelExtension.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.fourplex.Inspect.PacketTunnelExtension
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: PacketTunnelExtension/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: PacketTunnelExtension/Resources/InspectPacketTunnelExtension.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: PacketTunnelExtension/Sources/InspectPacketTunnelExtension-Bridging-Header.h
        HEADER_SEARCH_PATHS: $(inherited) "$(PROJECT_DIR)/Rust/tunnel-core/include"
        LIBRARY_SEARCH_PATHS: $(inherited) "$(BUILT_PRODUCTS_DIR)"
        OTHER_LDFLAGS: $(inherited) -ltunnel_core
        SKIP_INSTALL: YES
    preBuildScripts:
      - name: Build Rust Tunnel Core
        script: |
          export PATH="$HOME/.cargo/bin:$PATH"
          ./scripts/build_rust_lib.sh
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/libtunnel_core.a
    dependencies:
      - package: InspectCore
        product: InspectCore

  InspectMacPacketTunnelExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: PacketTunnelExtension/Sources
      - path: PacketTunnelExtension/Resources
        buildPhase: resources
        excludes:
          - Info.plist
          - InspectPacketTunnelExtension.entitlements
          - InspectMacPacketTunnelExtension-Info.plist
          - InspectMacPacketTunnelExtension.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.fourplex.Inspect.PacketTunnelExtension
        APPLICATION_EXTENSION_API_ONLY: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: PacketTunnelExtension/Resources/InspectMacPacketTunnelExtension-Info.plist
        CODE_SIGN_ENTITLEMENTS: PacketTunnelExtension/Resources/InspectMacPacketTunnelExtension.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: PacketTunnelExtension/Sources/InspectPacketTunnelExtension-Bridging-Header.h
        HEADER_SEARCH_PATHS: $(inherited) "$(PROJECT_DIR)/Rust/tunnel-core/include"
        LIBRARY_SEARCH_PATHS: $(inherited) "$(BUILT_PRODUCTS_DIR)"
        OTHER_LDFLAGS: $(inherited) -ltunnel_core
        SKIP_INSTALL: YES
    preBuildScripts:
      - name: Build Rust Tunnel Core
        script: |
          export PATH="$HOME/.cargo/bin:$PATH"
          ./scripts/build_rust_lib.sh
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(BUILT_PRODUCTS_DIR)/libtunnel_core.a
    dependencies:
      - package: InspectCore
        product: InspectCore
      - sdk: SystemConfiguration.framework

  InspectActionExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: Extension/Sources
      - path: Extension/Resources
        buildPhase: resources
        excludes:
          - Info.plist
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: ExtensionIcon
        PRODUCT_BUNDLE_IDENTIFIER: in.fourplex.Inspect.ActionExtension
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Extension/Resources/Info.plist
        SKIP_INSTALL: YES
    dependencies:
      - package: InspectCore
        product: InspectFeature

  Inspect:
    type: application
    platform: iOS
    sources:
      - path: App/Sources
      - path: App/Resources
        buildPhase: resources
        excludes:
          - Info.plist
          - Inspect.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.fourplex.Inspect
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: App/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: App/Resources/Inspect.entitlements
    dependencies:
      - package: InspectCore
        product: InspectFeature
      - target: InspectPacketTunnelExtension
        embed: true
      - target: InspectActionExtension
        embed: true
    scheme:
      gatherCoverageData: false
      testTargets:
        - InspectAppTests

  InspectMac:
    type: application
    platform: macOS
    sources:
      - path: MacApp/Sources
      - path: MacApp/Resources
        buildPhase: resources
        excludes:
          - AppIcon.disabled
          - Assets.xcassets
          - Info.plist
          - InspectMac.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: in.fourplex.Inspect
        PRODUCT_NAME: Inspect
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: MacApp/Resources/Info.plist
        INFOPLIST_ENABLE_CFBUNDLEICONS_MERGE: NO
        CODE_SIGN_ENTITLEMENTS: MacApp/Resources/InspectMac.entitlements
    dependencies:
      - package: InspectCore
        product: InspectCore
      - package: InspectCore
        product: InspectFeature
      - target: InspectMacPacketTunnelExtension
        embed: true
    scheme:
      gatherCoverageData: false
      testTargets:
        - InspectMacTests

  InspectAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Packages/InspectCore/Tests/CoreTests
        excludes:
          - CertificateParserTests.swift
          - TLSFlowObservationFeedTests.swift
          - TestFixtureSupport.swift
      - path: Packages/InspectCore/Tests/FeatureTests
    dependencies:
      - package: InspectCore
        product: InspectCore
      - package: InspectCore
        product: InspectFeature
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: in.fourplex.Inspect.tests

  InspectMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Packages/InspectCore/Tests/CoreTests
        excludes:
          - CertificateParserTests.swift
          - TLSFlowObservationFeedTests.swift
          - TestFixtureSupport.swift
      - path: Packages/InspectCore/Tests/FeatureTests
    dependencies:
      - package: InspectCore
        product: InspectCore
      - package: InspectCore
        product: InspectFeature
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: in.fourplex.Inspect.mac.tests
