name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios,aarch64-apple-ios-sim,x86_64-apple-ios

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build InspectCore package for iOS Simulator
        shell: bash
        run: |
          set -o pipefail
          LOG_FILE="$(mktemp)"
          if ! xcodebuild -scheme InspectCore -project Inspect.xcodeproj -destination 'generic/platform=iOS Simulator' build 2>&1 | tee "$LOG_FILE" | xcbeautify; then
            echo "::group::InspectCore raw xcodebuild log"
            cat "$LOG_FILE"
            echo "::endgroup::"
            exit 1
          fi

      - name: Build iOS app for Simulator
        shell: bash
        run: |
          set -o pipefail
          LOG_FILE="$(mktemp)"
          if ! xcodebuild -scheme Inspect -project Inspect.xcodeproj -destination 'generic/platform=iOS Simulator' build 2>&1 | tee "$LOG_FILE" | xcbeautify; then
            echo "::group::Inspect raw xcodebuild log"
            cat "$LOG_FILE"
            echo "::endgroup::"
            exit 1
          fi
